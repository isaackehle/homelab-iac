services:
  frigate:
    container_name: frigate
    restart: unless-stopped
    stop_grace_period: 30s
    # Pinned deliberately, not `:stable` — see CLAUDE.md re: floating tags on
    # fast-moving GitOps-deployed stacks. Check current release before you
    # pin: https://github.com/blakeblackshear/frigate/releases
    image: ghcr.io/blakeblackshear/frigate:0.16.4
    shm_size: "1gb"   # ~7-10 cameras; bump if you see "Bus error" crashes in logs
    volumes:
      - ./config:/config
      - ./storage:/media/frigate   # point this at real bulk storage, not the system volume — see note below
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      - "8971:8971"        # Web UI
      - "8554:8554"        # RTSP restream
      - "8555:8555/tcp"    # WebRTC
      - "8555:8555/udp"
    environment:
      - FRIGATE_MQTT_HOST=${FRIGATE_MQTT_HOST}
      - FRIGATE_MQTT_USER=${FRIGATE_MQTT_USER}
      - FRIGATE_MQTT_PASSWORD=${FRIGATE_MQTT_PASSWORD}
      - FRIGATE_RTSP_USER=${FRIGATE_RTSP_USER}
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD}

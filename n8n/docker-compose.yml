# n8n — Tailscale sidecar pattern (Pattern B, see README)
#
# n8n has a sibling container (browserless, for headless Chromium), so both
# `browserless` and the `n8n-ts` sidecar are joined to `n8n-net` — that's what
# lets `n8n` (which borrows the sidecar's network namespace) reach
# `browserless` by name. See nextcloud/docker-compose.yml for a comparable
# real example of this pattern.

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=https://n8n.${TS_TAILNET_DOMAIN}/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      # Generate once with: openssl rand -hex 24 — then keep this stable, it encrypts your stored credentials
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - BROWSERLESS_URL=http://browserless:3000
    volumes:
      - /volume1/docker/stacks/n8n/config:/home/node/.n8n
      - /volume1/docker/stacks/n8n/files:/files
    # No `ports:` and no `networks:` of its own — it borrows the sidecar's
    # network namespace entirely. If n8n needs a LAN port in addition to the
    # tailnet, put that `ports:` entry on n8n-ts below instead.
    network_mode: service:n8n-ts
    depends_on:
      - n8n-ts
      - browserless

  # Headless Chromium as a sibling service n8n's HTTP Request / Browserless
  # nodes call into over n8n-net. This avoids running a full browser inside
  # the n8n container itself.
  browserless:
    image: browserless/chrome:latest
    container_name: n8n-browserless
    restart: unless-stopped
    environment:
      - MAX_CONCURRENT_SESSIONS=2
      - CONNECTION_TIMEOUT=60000
      - TZ=${TZ}
    networks:
      - n8n-net

  n8n-ts:
    image: tailscale/tailscale:latest
    container_name: n8n-ts
    restart: unless-stopped
    environment:
      - TS_HOSTNAME=n8n # tailnet-facing name only — set via env, NOT the
        # compose `hostname:` field (which causes a real DNS
        # collision with other sidecar nodes — see README
        # "known DNS collision")
      - TS_AUTHKEY=${TS_AUTHKEY_N8N}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_ONCE=true
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - /volume1/docker/stacks/n8n/ts-state:/var/lib/tailscale
      - /volume1/docker/stacks/n8n/ts-config:/config
      - /volume1/docker/stacks/n8n/serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - n8n-net

networks:
  n8n-net:
    driver: bridge

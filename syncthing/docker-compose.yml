services:
  syncthing:
    image: ghcr.io/linuxserver/syncthing:latest
    # image: syncthing/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    hostname: synology-nas
    healthcheck:
      test: curl -f http://localhost:8384/ || exit 1
    environment:
      - TZ=${TZ}
      - PUID=${SYNC_PUID}
      - PGID=${SYNC_PGID}
    volumes:
      - /volume1/docker/stacks/syncthing/config:/config:rw
      - /volume1/docker/stacks/syncthing/sync:/var/syncthing/sync:rw
      - /volume1/docker/stacks/syncthing/data:/var/syncthing/data:rw
    ports:
      - "8384:8384" # GUI — still reachable directly via voyager.<tailnet>.ts.net:8384 too
      - "22000:22000/tcp" # sync protocol
      - "22000:22000/udp"
      - "21027:21027/udp"

  ts-syncthing:
    image: tailscale/tailscale:latest
    container_name: ts-syncthing
    network_mode: service:syncthing
    restart: unless-stopped
    environment:
      - TS_HOSTNAME=syncthing # tailnet-facing name only — does NOT create a
        # Docker network DNS alias, unlike the compose
        # `hostname:` field (which caused a real
        # collision with the syncthing service's own
        # DNS name — see CLAUDE.md)
      - TS_AUTHKEY=${TS_AUTHKEY_SYNCTHING}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_ONCE=true
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - /volume1/docker/stacks/syncthing/ts-config:/config
      - /volume1/docker/stacks/syncthing/serve.json:/config/serve.json:ro
      - /volume1/docker/stacks/syncthing/ts-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - syncthing

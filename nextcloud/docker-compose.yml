services:
  db:
    image: postgres:16
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${NC_DB_PASSWORD}
    volumes:
      - /volume1/docker/nextcloud/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    network_mode: service:nextcloud
    restart: unless-stopped

  nextcloud:
    # Pinned to a specific major version deliberately — Nextcloud does NOT
    # support skipping major versions on upgrade, and `:latest` pulling a
    # new major on container recreation can break the instance outright.
    # Check https://github.com/nextcloud/server/releases for current major
    # before deploying; bump this pin on purpose, not automatically.
    image: nextcloud:apache
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${NC_DB_PASSWORD}
      - REDIS_HOST=redis
      - NEXTCLOUD_ADMIN_USER=${NC_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NC_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${TS_CERT_DOMAIN}
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://${TS_CERT_DOMAIN}
      - PHP_MEMORY_LIMIT=1G
      - PHP_UPLOAD_LIMIT=10G
    volumes:
      - /volume1/docker/nextcloud/app:/var/www/html
      - /volume1/docker/nextcloud/data:/var/www/html/data

  ts-nextcloud:
    image: tailscale/tailscale:latest
    container_name: ts-nextcloud
    network_mode: service:nextcloud
    restart: unless-stopped
    environment:
      - TS_HOSTNAME=nextcloud   # env var, NOT the compose `hostname:` field —
                                 # that caused a real DNS collision with the
                                 # Nextcloud sidecar, see CLAUDE.md
      - TS_AUTHKEY=${TS_AUTHKEY_NEXTCLOUD}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_ONCE=true
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - /volume1/docker/nextcloud/ts-config:/config
      - /volume1/docker/stacks/nextcloud/serve.json:/config/serve.json:ro
      - /volume1/docker/nextcloud/ts-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - nextcloud

services:
  portainer-ts:
    image: tailscale/tailscale:latest
    container_name: portainer-ts
    restart: always
    hostname: portainer
    environment:
      - TS_HOSTNAME=${TS_HOSTNAME_PORTAINER:-portainer}
      - TS_AUTHKEY=${TS_AUTHKEY_PORTAINER}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_ONCE=true
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - /volume1/docker/stacks/portainer/ts-state:/var/lib/tailscale
      - /volume1/docker/stacks/portainer/serve.json:/config/serve.json:ro
      - /volume1/docker/stacks/portainer/ts-config:/config
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "19443:9443"
      - "9000:9000"
      - "8000:8000"
    networks:
      - portainer_net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    security_opt:
      - no-new-privileges:true
    network_mode: service:portainer-ts
    depends_on:
      - portainer-ts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /volume1/docker/stacks/portainer:/data

networks:
  portainer_net:
    driver: bridge
